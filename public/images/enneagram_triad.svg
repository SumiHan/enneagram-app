  <text x="425" y="231" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#d97706" font-family="sans-serif">2</text>
  <text x="453" y="226" text-anchor="start" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">조력가</text>

  <!-- 3 -->
  <circle cx="405" cy="344" r="19" fill="#FFFBEB" stroke="#d97706" stroke-width="1.5"/>
  <text x="405" y="344" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#d97706" font-family="sans-serif">3</text>
  <text x="430" y="358" text-anchor="start" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">성취가</text>

