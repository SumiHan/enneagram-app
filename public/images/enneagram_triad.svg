<svg width="100%" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>에니어그램 세 가지 중심 원형 다이어그램</title>
  <desc>1·8·9 본능 중심, 2·3·4 감정 중심, 5·6·7 사고 중심으로 구분된 에니어그램</desc>

  <defs>
    <clipPath id="cc6">
      <circle cx="260" cy="260" r="168"/>
    </clipPath>
  </defs>

  <path d="M260 260 L115 176 A168 168 0 0 1 406 176 Z" fill="#FEF2F2" clip-path="url(#cc6)"/>
  <path d="M260 260 L406 176 A168 168 0 0 1 260 428 Z" fill="#FFFBEB" clip-path="url(#cc6)"/>
  <path d="M260 260 L260 428 A168 168 0 0 1 115 176 Z" fill="#EFF6FF" clip-path="url(#cc6)"/>

  <circle cx="260" cy="260" r="168" fill="none" stroke="#B4B2A9" stroke-width="1.2"/>

  <line x1="260" y1="260" x2="115" y2="176" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3"/>
  <line x1="260" y1="260" x2="406" y2="176" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3"/>
  <line x1="260" y1="260" x2="260" y2="428" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3"/>

  <line x1="260" y1="92"  x2="406" y2="344" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="406" y1="344" x2="114" y2="344" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="114" y1="344" x2="260" y2="92"  stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="368" y1="131" x2="317" y2="418" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="317" y1="418" x2="426" y2="231" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="426" y1="231" x2="152" y2="131" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="152" y1="131" x2="203" y2="418" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="203" y1="418" x2="94"  y2="231" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>
  <line x1="94"  y1="231" x2="368" y2="131" stroke="#B4B2A9" stroke-width="0.8" opacity="0.35"/>

  <text x="260" y="180" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#dc2626" font-family="sans-serif">본능 중심</text>
  <text x="329" y="300" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#d97706" font-family="sans-serif">감정 중심</text>
  <text x="191" y="300" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#2563eb" font-family="sans-serif">사고 중심</text>

  <!-- 9 -->
  <circle cx="260" cy="92" r="19" fill="#FEF2F2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="260" y="92" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#dc2626" font-family="sans-serif">9</text>
  <text x="260" y="58" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">평화주의자</text>

