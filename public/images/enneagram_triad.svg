  <text x="317" y="418" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#d97706" font-family="sans-serif">4</text>
  <text x="317" y="452" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">예술가</text>

  <!-- 5 -->
  <circle cx="203" cy="418" r="19" fill="#EFF6FF" stroke="#2563eb" stroke-width="1.5"/>
  <text x="203" y="418" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#2563eb" font-family="sans-serif">5</text>
  <text x="200" y="452" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">탐구가</text>

  <!-- 6 -->
  <circle cx="115" cy="344" r="19" fill="#EFF6FF" stroke="#2563eb" stroke-width="1.5"/>
  <text x="115" y="344" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#2563eb" font-family="sans-serif">6</text>
  <text x="90" y="358" text-anchor="end" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">충성가</text>

