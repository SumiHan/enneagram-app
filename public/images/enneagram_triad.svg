  <text x="95" y="231" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#2563eb" font-family="sans-serif">7</text>
  <text x="67" y="226" text-anchor="end" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">열정가</text>

  <!-- 8 -->
  <circle cx="152" cy="131" r="19" fill="#FEF2F2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="152" y="131" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#dc2626" font-family="sans-serif">8</text>
  <text x="134" y="110" text-anchor="end" dominant-baseline="central" font-size="15" font-weight="700" fill="#888780" font-family="sans-serif">도전가</text>

</svg>
